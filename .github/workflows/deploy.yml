name: CARES DevOps Pipeline

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: pip install flask scikit-learn numpy

  - name: Test Syntax
    run: python -m py_compile app.py
```

