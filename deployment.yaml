apiVersion: apps/v1
kind: Deployment
metadata:
  name: cares-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cares
  template:
    metadata:
      labels:
        app: cares
    spec:
      containers:
      - name: cares-container
        image: cares-ai:latest
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: cares-service
spec:
  type: NodePort
  selector:
    app: cares
  ports:
    - port: 80
      targetPort: 5002
      nodePort: 30007